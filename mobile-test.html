<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mobile Test - Coherencia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  height: 100%; 
  overflow: hidden; 
  position: fixed; 
  width: 100%;
}
body {
  background: #060a10;
  color: #7aa8b8;
  font-family: system-ui, -apple-system, sans-serif;
  display: grid;
  grid-template-rows: 52px 1fr 90px;
  height: 100vh;
  height: 100dvh;
}

/* HEADER */
.header {
  background: #0a1220;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(80,180,200,0.1);
}
.title {
  font-size: 11px;
  letter-spacing: 3px;
  color: #50b4c8;
  text-transform: uppercase;
  font-weight: 600;
}
.btn {
  font-size: 7px;
  padding: 3px 8px;
  border: 1px solid rgba(80,180,200,0.2);
  border-radius: 4px;
  background: transparent;
  color: #2e4a58;
  cursor: pointer;
}
.spacer { flex: 1; }

/* CENTER */
.center {
  background: #0a1220;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.orb {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #50b4c8;
  background: radial-gradient(circle at 32% 32%, rgba(80,180,200,0.18), rgba(80,180,200,0.02));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.orb-label {
  font-size: 6px;
  letter-spacing: 2px;
  color: #50b4c8;
  text-transform: uppercase;
}
.orb-time {
  font-size: 14px;
  color: #c8dde8;
}
.info {
  text-align: center;
  font-size: 12px;
  color: #2e4a58;
}

/* BOTTOM BAR */
.bottom {
  background: #0a1220;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  border-top: 1px solid rgba(80,180,200,0.1);
  min-height: 90px;
}
.stat {
  text-align: center;
  min-width: 28px;
}
.stat-n {
  font-size: 13px;
  color: #50b4c8;
  display: block;
}
.stat-l {
  font-size: 6.5px;
  color: #2e4a58;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.play-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid #50b4c8;
  background: transparent;
  color: #50b4c8;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  flex-shrink: 0;
}
.play-btn:active {
  background: rgba(80,180,200,0.1);
  transform: scale(0.95);
}
.play-btn.on {
  border-color: #d4a84b;
  color: #d4a84b;
}
.made-with-love {
  font-size: 7px;
  color: #2e4a58;
  letter-spacing: 1px;
  text-align: center;
  width: 100%;
  padding: 2px 0 0;
  border-top: 1px solid rgba(80,180,200,0.1);
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  10% { transform: scale(1.2); }
  20% { transform: scale(1); }
  30% { transform: scale(1.2); }
  40% { transform: scale(1); }
}
.heart {
  color: #e05555;
  animation: heartbeat 1.5s ease-in-out infinite;
  display: inline-block;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="title">COHERENCIA</div>
  <div class="spacer"></div>
  <button class="btn">☰ Presets</button>
  <button class="btn">∂ Ciencia</button>
</div>

<!-- CENTER -->
<div class="center">
  <div class="orb">
    <span class="orb-label">LISTO</span>
    <span class="orb-time">–</span>
  </div>
  <div class="info">
    ✅ Header visible<br>
    ✅ Orb centrado<br>
    ✅ Bottom bar visible<br>
    ✅ Botón Play visible<br>
    <br>
    Viewport: <span id="vw"></span>×<span id="vh"></span>px
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom">
  <div class="stat">
    <span class="stat-n" id="cycles">0</span>
    <span class="stat-l">Ciclos</span>
  </div>
  <div class="stat">
    <span class="stat-n">0:00</span>
    <span class="stat-l">Sesión</span>
  </div>
  <div class="stat">
    <span class="stat-n">6.0</span>
    <span class="stat-l">Resp/min</span>
  </div>
  
  <button class="play-btn" id="playBtn" onclick="toggle()">▶</button>
  
  <div class="made-with-love">
    Hecho con <span class="heart">♥</span>
  </div>
</div>

<script>
let playing = false;
let count = 0;

function toggle() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '■' : '▶';
  btn.classList.toggle('on', playing);
  
  if (playing) {
    count++;
    document.getElementById('cycles').textContent = count;
  }
}

function updateViewport() {
  document.getElementById('vw').textContent = window.innerWidth;
  document.getElementById('vh').textContent = window.innerHeight;
}

updateViewport();
window.addEventListener('resize', updateViewport);
window.addEventListener('orientationchange', updateViewport);
</script>

</body>
</html>
